name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Live tests create real `vk-live-*` repos against the GitHub account that
# owns VAULTKIT_TEST_GH_TOKEN. Concurrency: only one CI run touches that
# account at a time, so name collisions and orphan races stay contained.
concurrency:
  group: vaultkit-live-tests
  cancel-in-progress: false

jobs:
  test-and-check:
    timeout-minutes: 15
    strategy:
      fail-fast: false
      # Serial — both runners hit the same test GH account, and parallel
      # create/delete bursts trip GitHub's abuse heuristics. `max-parallel: 1`
      # roughly doubles wall-clock but keeps the account in good standing.
      max-parallel: 1
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      # Classic PAT (delete_repo + repo + workflow scopes) on a dedicated
      # test GitHub account. Add via repo Settings → Secrets → Actions.
      GH_TOKEN: ${{ secrets.VAULTKIT_TEST_GH_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Authenticate gh CLI
        shell: bash
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "VAULTKIT_TEST_GH_TOKEN secret is missing — live tests will fail."
            exit 1
          fi
          # GH_TOKEN env is auto-detected by gh; no `gh auth login` needed.
          gh auth status

      - name: Configure git for live tests
        shell: bash
        run: |
          # init's preflight needs git user.name/user.email set, otherwise
          # it tries to prompt via @inquirer/prompts.input — which isn't
          # mocked in every live test file. Pre-setting them here makes the
          # prompt branch never fire.
          git config --global user.name "vaultkit-ci"
          git config --global user.email "ci@vaultkit.test"
          # `git push https://github.com/...` uses git's credential helper
          # (not gh's GH_TOKEN env). Wire a credential.helper that points
          # at the PAT so push works without interactive prompting.
          git config --global credential.helper store
          printf 'https://x-access-token:%s@github.com\n' "$GH_TOKEN" > "$HOME/.git-credentials"
          chmod 600 "$HOME/.git-credentials"

      - name: Pre-test cleanup of orphaned live-test repos
        if: always()
        shell: bash
        run: |
          USER=$(gh api user --jq .login)
          # Filter inside jq so an empty result is an empty stream (exit 0),
          # not `grep`'s no-match exit 1 — bash -e -o pipefail treats the
          # latter as fatal and kills the workflow.
          gh repo list "$USER" --limit 200 --json name \
            --jq '.[] | select(.name | startswith("vk-live-")) | .name' \
            | while read -r repo; do
                echo "Deleting orphan: $USER/$repo"
                gh repo delete "$USER/$repo" --yes || true
              done

      - name: Run tests
        run: npm test

      - name: Post-test cleanup of any remaining live-test repos
        if: always()
        shell: bash
        run: |
          USER=$(gh api user --jq .login)
          gh repo list "$USER" --limit 200 --json name \
            --jq '.[] | select(.name | startswith("vk-live-")) | .name' \
            | while read -r repo; do
                echo "Cleaning up: $USER/$repo"
                gh repo delete "$USER/$repo" --yes || true
              done

      - name: npm publish dry-run (verify package contents)
        run: npm publish --dry-run --access public
