name: Release

on:
  push:
    tags:
      - 'v*.*.*'

# Live tests run on the release runner and create real `vk-live-*` repos
# under the test GitHub account. Concurrency: only one live-test workflow
# (CI or Release) touches that account at a time.
concurrency:
  group: vaultkit-live-tests
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write  # for npm provenance
    env:
      # Classic PAT (delete_repo + repo + workflow scopes) on a dedicated
      # test GitHub account. Same secret used by ci.yml. `gh` auto-detects
      # GH_TOKEN and skips the interactive device-code flow.
      GH_TOKEN: ${{ secrets.VAULTKIT_TEST_GH_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Verify tag matches package.json version
        run: |
          PKG_VER=$(node -p "require('./package.json').version")
          TAG_VER="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VER" != "$TAG_VER" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $PKG_VER" >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Authenticate gh CLI
        shell: bash
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "VAULTKIT_TEST_GH_TOKEN secret is missing — live tests will fail." >&2
            exit 1
          fi
          # GH_TOKEN env is auto-detected by gh; no `gh auth login` needed.
          gh auth status

      - name: Configure git for live tests
        shell: bash
        run: |
          # init's preflight needs git user.name/user.email set, otherwise
          # it tries to prompt via @inquirer/prompts.input.
          git config --global user.name "vaultkit-ci"
          git config --global user.email "ci@vaultkit.test"
          # `git push https://github.com/...` uses git's credential helper
          # (not gh's GH_TOKEN env). Wire credential.helper to the PAT.
          git config --global credential.helper store
          printf 'https://x-access-token:%s@github.com\n' "$GH_TOKEN" > "$HOME/.git-credentials"
          chmod 600 "$HOME/.git-credentials"

      - name: Pre-test cleanup of orphaned live-test repos
        if: always()
        shell: bash
        run: |
          USER=$(gh api user --jq .login)
          gh repo list "$USER" --limit 200 --json name \
            --jq '.[] | select(.name | startswith("vk-live-")) | .name' \
            | while read -r repo; do
                echo "Deleting orphan: $USER/$repo"
                gh repo delete "$USER/$repo" --yes || true
              done

      - name: Run tests
        run: npm test

      - name: Post-test cleanup of any remaining live-test repos
        if: always()
        shell: bash
        run: |
          USER=$(gh api user --jq .login)
          gh repo list "$USER" --limit 200 --json name \
            --jq '.[] | select(.name | startswith("vk-live-")) | .name' \
            | while read -r repo; do
                echo "Cleaning up: $USER/$repo"
                gh repo delete "$USER/$repo" --yes || true
              done

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
